<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .container {
      width: 50%;
      margin: 50px auto;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      font-size: 1.2em;
      display: block;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 10px;
      font-size: 1em;
    }
    .form-group button {
      padding: 10px 20px;
      font-size: 1em;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
    .form-group button:hover {
      background-color: #0056b3;
    }
    .alert {
      margin-top: 20px;
      padding: 10px;
      font-size: 1.1em;
      text-align: center;
    }
    .alert.success {
      background-color: #28a745;
      color: white;
    }
    .alert.error {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Admin Panel</h2>
  <p>Assign a role to a user:</p>

  <!-- Admin Panel Form -->
  <div class="form-group">
    <label for="adminUsername">Admin Username</label>
    <input type="text" id="adminUsername" placeholder="Enter Admin Username" required>
  </div>

  <div class="form-group">
    <label for="targetUsername">Target Username</label>
    <input type="text" id="targetUsername" placeholder="Enter Target Username" required>
  </div>

  <div class="form-group">
    <label for="newRole">New Role</label>
    <select id="newRole" required>
      <option value="USER">USER</option>
      <option value="ADMIN">ADMIN</option>
      <option value="SUPERADMIN">SUPERADMIN</option>
      <option value="UDVIKLER">UDVIKLER</option>
      <option value="AFVIKLER">AFVIKLER</option>
    </select>
  </div>

  <div class="form-group">
    <button id="delegateRoleButton">Delegate Role</button>
  </div>

  <!-- Alert message -->
  <div id="alertMessage" class="alert" style="display: none;"></div>
</div>

<script>
  document.getElementById("delegateRoleButton").addEventListener("click", function() {
    const adminUsername = document.getElementById("adminUsername").value;
    const targetUsername = document.getElementById("targetUsername").value;
    const newRole = document.getElementById("newRole").value;

    // Check if the inputs are not empty
    if (adminUsername && targetUsername && newRole) {
      // Call the backend to delegate the role
      fetch("/delegateRole?adminUsername=" + adminUsername + "&targetUsername=" + targetUsername + "&newRole=" + newRole, {
        method: "POST",
      })
              .then(response => response.json())
              .then(data => {
                // Show success or error message based on the response
                const alertMessage = document.getElementById("alertMessage");
                if (data.message === "Role updated successfully.") {
                  alertMessage.classList.remove("error");
                  alertMessage.classList.add("success");
                  alertMessage.textContent = data.message;
                } else {
                  alertMessage.classList.remove("success");
                  alertMessage.classList.add("error");
                  alertMessage.textContent = data.message;
                }
                alertMessage.style.display = "block";
              })
              .catch(error => {
                console.error('Error:', error);
                alert("There was an error processing your request.");
              });
    } else {
      alert("All fields are required.");
    }
  });
</script>

</body>
</html>
