<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add/Update Event Room</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    .form-container {
      margin: 2rem;
      padding: 1rem;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .form-container h2 {
      font-size: 24px;
    }
    .btn {
      background-color: #4CAF50;
      color: white;
      padding: 1rem;
      border: none;
      cursor: pointer;
      margin: 1rem 0;
    }
    .btn:hover {
      background-color: #45a049;
    }
    .cancel-btn {
      background-color: #f44336;
    }
    .cancel-btn:hover {
      background-color: #d32f2f;
    }
  </style>
</head>
<body>

<header>
  <h1>Add or Update Event Room</h1>
</header>

<div class="form-container">
  <h2>Event Room Form</h2>

  <label for="roomName">Room Name:</label>
  <input type="text" id="roomName" name="roomName" required><br><br>

  <label for="floor">Floor:</label>
  <input type="text" id="floor" name="floor" required><br><br>

  <button id="saveRoomBtn" class="btn">Save</button>
  <button id="cancelBtn" class="cancel-btn">Cancel</button>
</div>

<script>
  // The JavaScript for form handling can be the same as above to add and update rooms.
</script>

</body>
</html>
