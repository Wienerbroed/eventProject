<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .favorite-btn {
            cursor: pointer;
            font-size: 24px;
            color: gray;
            border: none;
            background: none;
        }
        .favorite-btn.favorited {
            color: red; /* Change color to red when favorited */
        }
    </style>
</head>
<body>
<header>
    <h1>All Events</h1>
</header>
<div>
    <button class="add-event-btn" onclick="window.location.href='addEvent.html';">Add Event</button>
</div>
<div id="eventsContainer"></div>

<script>
    const userId = 1; // Replace with actual logged-in user ID

    async function fetchEvents() {
        try {
            const response = await fetch('http://localhost:3000/api/events');
            if (!response.ok) {
                throw new Error('Failed to fetch events');
            }
            const events = await response.json();
            displayEvents(events);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function displayEvents(events) {
        const eventsContainer = document.getElementById('eventsContainer');
        eventsContainer.innerHTML = '';

        events.forEach(event => {
            const eventElement = document.createElement('div');
            eventElement.classList.add('event');
            eventElement.innerHTML = `
                <h2 onclick="window.location.href='seeEvent.html?id=${event.eventId}'">${event.title}</h2>
                <p><strong>Creator:</strong> ${event.eventCreator}</p>
                <p><strong>Responsible:</strong> ${event.eventResponsible}</p>
                <p><strong>Control:</strong> ${event.eventControl}</p>
                <p><strong>Type:</strong> ${event.eventType}</p>
                <p><strong>Description:</strong> ${event.description}</p>
                <p><strong>Max Participants:</strong> ${event.maxParticipants}</p>
                <p><strong>Max Audience:</strong> ${event.maxAudience}</p>
                <p><strong>Guide (DK):</strong> ${event.conguideDk}</p>
                <p><strong>Guide (EN):</strong> ${event.conguideEn}</p>
                <button class="favorite-btn" id="favorite-${event.eventId}" onclick="toggleFavorite(${event.eventId}, this)">&#x2764;</button>
            `;
            eventsContainer.appendChild(eventElement);

            checkFavorite(event.eventId);
        });
    }

    async function checkFavorite(eventId) {
        try {
            const response = await fetch(`http://localhost:3000/api/events/${eventId}/isFavorited?userId=${userId}`);
            if (response.ok) {
                const isFavorited = await response.json();
                const button = document.getElementById(`favorite-${eventId}`);
                if (isFavorited) {
                    button.classList.add('favorited');
                }
            }
        } catch (error) {
            console.error('Error checking favorite status:', error);
        }
    }

    async function toggleFavorite(eventId, button) {
        try {
            const method = button.classList.contains('favorited') ? 'DELETE' : 'POST';
            const response = await fetch(`http://localhost:3000/api/events/${eventId}/favorite`, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId })
            });

            if (response.ok) {
                button.classList.toggle('favorited');
            } else {
                alert('Error updating favorite status');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred.');
        }
    }

    window.onload = fetchEvents;
</script>
</body>
</html>
