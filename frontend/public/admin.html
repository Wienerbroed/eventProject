<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Delegate Role</title>
  <link rel="stylesheet" href="styles.css"> <!-- Optional -->
</head>
<body>
<h1>Delegate Role</h1>
<form id="delegateRoleForm">
  <label for="targetUsername">Target Username:</label>
  <input type="text" id="targetUsername" name="targetUsername" required>

  <label for="newRole">New Role:</label>
  <select id="newRole" name="newRole" required>
    <!-- Options will be dynamically populated -->
  </select>

  <button type="submit">Assign Role</button>
</form>

<div id="responseMessage"></div>

<!-- Link to external JavaScript file -->
<script src="/js/delegateRole.js" defer></script>
</body>
</html>
